services:
  - type: web
    name: taskhub-backend
    env: docker
    plan: free
    dockerContext: server
    dockerfilePath: server/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DB_PORT
        value: 5432
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
