services:
  - type: web
    name: taskhub-backend
    env: docker
    plan: free
    dockerContext: server
    dockerfilePath: server/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: taskhub-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: taskhub-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: taskhub-db
          property: password

databases:
  - name: taskhub-db
    plan: free
    databaseName: taskhub
    user: taskhub_user
